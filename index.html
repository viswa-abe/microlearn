<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Microlearn">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Microlearn</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #050505;
  --card-bg: rgba(255, 255, 255, 0.04);
  --card-border: rgba(255, 255, 255, 0.08);
  --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 2px 8px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
  --text: #f0f0f0;
  --text-dim: #808080;
  --text-faint: #3a3a3a;
  --accent: #7aa2ff;
  --accent-dim: rgba(122, 162, 255, 0.15);
  --accent-glow: rgba(122, 162, 255, 0.08);
  --green: #34d399;
  --red: #fb7185;
  --purple: #c4b5fd;
  --emerald: #6ee7b7;
  --safe-top: env(safe-area-inset-top, 20px);
  --safe-bottom: env(safe-area-inset-bottom, 20px);
}

body {
  background: var(--bg);
  background-image: radial-gradient(ellipse at 50% 0%, rgba(122, 162, 255, 0.03) 0%, transparent 60%);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  height: 100dvh;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.app {
  height: 100dvh;
  display: flex;
  flex-direction: column;
  padding-top: var(--safe-top);
}

/* ── Views ── */
.view { display: none; height: 100%; flex-direction: column; }
.view.active { display: flex; }

/* ── Feed View ── */
#feedView {
  position: relative;
  overflow: hidden;
}

.feed-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 20px 8px;
  flex-shrink: 0;
  z-index: 10;
}

.feed-header h1 {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 2.5px;
  color: var(--text-dim);
  opacity: 0.7;
}

.feed-header .search-btn {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
}

/* Thought drop */
.thought-drop {
  padding: 0 20px 12px;
  flex-shrink: 0;
}

.thought-drop input {
  width: 100%;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: 14px;
  padding: 12px 18px;
  color: var(--text);
  font-size: 15px;
  font-weight: 300;
  outline: none;
  font-family: inherit;
  transition: all 0.3s ease;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.thought-drop input::placeholder {
  color: rgba(255, 255, 255, 0.2);
  font-weight: 300;
  font-style: italic;
}

.thought-drop input:focus {
  border-color: rgba(122, 162, 255, 0.3);
  background: rgba(255, 255, 255, 0.05);
  box-shadow: 0 0 20px rgba(122, 162, 255, 0.05);
}

/* Card stack area */
.card-stack {
  flex: 1;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 16px;
}

/* Teaser card (feed level) */
.teaser-card {
  position: absolute;
  width: calc(100% - 32px);
  max-width: 420px;
  height: 75%;
  max-height: 560px;
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--card-border);
  border-radius: 28px;
  padding: 40px 32px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  cursor: pointer;
  touch-action: none;
  will-change: transform;
  box-shadow: var(--card-shadow);
  transition: box-shadow 0.3s ease;
}

.teaser-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 28px;
  padding: 1px;
  background: linear-gradient(
    160deg,
    rgba(255, 255, 255, 0.1) 0%,
    rgba(255, 255, 255, 0) 40%,
    rgba(255, 255, 255, 0) 60%,
    rgba(255, 255, 255, 0.03) 100%
  );
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}

.teaser-card .topic-tag {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 2.5px;
  color: var(--accent);
  margin-bottom: 20px;
  opacity: 0.9;
}

.teaser-card .card-title {
  font-size: 30px;
  font-weight: 700;
  line-height: 1.15;
  letter-spacing: -0.5px;
  margin-bottom: 24px;
  background: linear-gradient(to bottom, #fff, #ccc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.teaser-card .card-hook {
  font-size: 15px;
  font-weight: 300;
  line-height: 1.7;
  color: rgba(255, 255, 255, 0.5);
}

.teaser-card .card-depth {
  margin-top: auto;
  padding-top: 28px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-faint);
  letter-spacing: 0.5px;
}

.teaser-card .depth-dots {
  display: flex;
  gap: 5px;
}

.teaser-card .depth-dots .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.1);
  transition: background 0.2s;
}

.teaser-card .depth-dots .dot.filled {
  background: var(--accent);
  box-shadow: 0 0 6px rgba(122, 162, 255, 0.4);
}

/* Swipe indicators */
.swipe-indicator {
  position: absolute;
  top: 28px;
  padding: 10px 22px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0;
  pointer-events: none;
  z-index: 5;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  transition: opacity 0.15s ease;
}

.swipe-indicator.left {
  right: 28px;
  border: 1.5px solid var(--red);
  color: var(--red);
  background: rgba(251, 113, 133, 0.08);
}

.swipe-indicator.right {
  left: 28px;
  border: 1.5px solid var(--green);
  color: var(--green);
  background: rgba(52, 211, 153, 0.08);
}

/* Swipe hint at bottom */
.feed-hint {
  text-align: center;
  padding: 12px 20px;
  padding-bottom: calc(16px + var(--safe-bottom));
  font-size: 11px;
  font-weight: 400;
  color: rgba(255, 255, 255, 0.15);
  flex-shrink: 0;
  letter-spacing: 0.5px;
}

/* ── Concept View (depth cards) ── */
#conceptView {
  position: relative;
}

.concept-header {
  display: flex;
  align-items: center;
  padding: 12px 20px 8px;
  flex-shrink: 0;
  z-index: 10;
}

.back-btn {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 22px;
  cursor: pointer;
  padding: 4px 12px 4px 0;
}

.concept-header .concept-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-dim);
  flex: 1;
}

.concept-header .concept-count {
  font-size: 12px;
  color: var(--text-faint);
  font-variant-numeric: tabular-nums;
}

/* Depth card stack */
.depth-stack {
  flex: 1;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 16px;
}

.depth-card {
  position: absolute;
  width: calc(100% - 32px);
  max-width: 420px;
  height: 80%;
  max-height: 620px;
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--card-border);
  border-radius: 28px;
  padding: 36px 28px;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  touch-action: pan-y;
  will-change: transform;
  -webkit-overflow-scrolling: touch;
  box-shadow: var(--card-shadow);
}

.depth-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 28px;
  padding: 1px;
  background: linear-gradient(
    160deg,
    rgba(255, 255, 255, 0.1) 0%,
    rgba(255, 255, 255, 0) 40%,
    rgba(255, 255, 255, 0) 60%,
    rgba(255, 255, 255, 0.03) 100%
  );
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
}

.depth-card .phase-label {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: -0.3px;
  margin-bottom: 24px;
  background: linear-gradient(to bottom, #fff, #ccc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.depth-card .card-title {
  font-size: 22px;
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 20px;
}

.depth-card .card-body {
  font-size: 15px;
  font-weight: 300;
  line-height: 1.75;
  color: rgba(255, 255, 255, 0.6);
  flex: 1;
}

.depth-card .card-body strong,
.depth-card .card-body b {
  color: var(--accent);
  font-weight: 500;
}

.depth-card .card-body code {
  background: rgba(122, 162, 255, 0.08);
  padding: 2px 8px;
  border-radius: 5px;
  font-family: 'SF Mono', 'Menlo', monospace;
  font-size: 13px;
  color: var(--accent);
  border: 1px solid rgba(122, 162, 255, 0.1);
}

.depth-card .card-body pre {
  background: rgba(0, 0, 0, 0.4);
  padding: 18px;
  border-radius: 12px;
  margin: 16px 0;
  overflow-x: auto;
  font-family: 'SF Mono', 'Menlo', monospace;
  font-size: 13px;
  line-height: 1.6;
  color: rgba(255, 255, 255, 0.7);
  border: 1px solid rgba(255, 255, 255, 0.04);
}

.depth-card .card-body em {
  color: rgba(255, 255, 255, 0.8);
  font-style: italic;
}

/* Voice button */
.voice-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 16px 20px;
  padding-bottom: calc(16px + var(--safe-bottom));
  flex-shrink: 0;
}

.voice-btn {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.08);
  color: var(--text-dim);
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s ease;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.voice-btn:active {
  background: var(--accent-dim);
  border-color: rgba(122, 162, 255, 0.3);
  transform: scale(0.9);
  box-shadow: 0 0 20px rgba(122, 162, 255, 0.15);
}

.depth-nav-hint {
  font-size: 11px;
  font-weight: 400;
  color: rgba(255, 255, 255, 0.15);
  letter-spacing: 0.5px;
}

/* ── Search overlay ── */
.search-overlay {
  position: fixed;
  inset: 0;
  background: rgba(5, 5, 5, 0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 100;
  display: none;
  flex-direction: column;
  padding-top: var(--safe-top);
}

.search-overlay.active {
  display: flex;
  animation: fadeIn 0.2s ease;
}

.search-bar {
  display: flex;
  align-items: center;
  padding: 12px 20px;
  gap: 12px;
}

.search-bar input {
  flex: 1;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 14px;
  padding: 12px 18px;
  color: var(--text);
  font-size: 16px;
  font-weight: 300;
  outline: none;
  font-family: inherit;
  transition: border-color 0.2s;
}

.search-bar input:focus {
  border-color: rgba(122, 162, 255, 0.3);
}

.search-bar .close-search {
  background: none;
  border: none;
  color: var(--accent);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  padding: 8px;
}

.search-results {
  flex: 1;
  overflow-y: auto;
  padding: 0 20px;
}

.search-result-item {
  padding: 18px 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.04);
  cursor: pointer;
  transition: opacity 0.15s;
}

.search-result-item:active {
  opacity: 0.6;
}

.search-result-item .result-topic {
  font-size: 10px;
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 6px;
  opacity: 0.8;
}

.search-result-item .result-title {
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 6px;
  letter-spacing: -0.2px;
}

.search-result-item .result-snippet {
  font-size: 13px;
  font-weight: 300;
  color: rgba(255, 255, 255, 0.4);
  line-height: 1.5;
}

/* ── Animations ── */
@keyframes cardIn {
  from { transform: scale(0.92) translateY(40px); opacity: 0; filter: blur(4px); }
  to { transform: scale(1) translateY(0); opacity: 1; filter: blur(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.card-enter {
  animation: cardIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}

/* ── Empty state ── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-dim);
  text-align: center;
  padding: 40px;
}

.empty-state h2 {
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
  letter-spacing: -0.3px;
}

.empty-state p {
  font-size: 14px;
  font-weight: 300;
  line-height: 1.6;
  color: rgba(255, 255, 255, 0.3);
}

/* ── Back button ── */
.back-btn {
  background: none;
  border: none;
  color: var(--accent);
  font-size: 20px;
  cursor: pointer;
  padding: 4px 14px 4px 0;
  opacity: 0.8;
  transition: opacity 0.15s;
}

.back-btn:active {
  opacity: 0.5;
}

.concept-header .concept-title {
  font-size: 13px;
  font-weight: 500;
  color: rgba(255, 255, 255, 0.4);
  flex: 1;
  letter-spacing: 0.3px;
}

.concept-header .concept-count {
  font-size: 12px;
  color: rgba(255, 255, 255, 0.2);
  font-variant-numeric: tabular-nums;
}
</style>
</head>
<body>

<div class="app">
  <!-- Feed View -->
  <div id="feedView" class="view active">
    <div class="feed-header">
      <h1>MICROLEARN</h1>
      <button class="search-btn" id="searchBtn">&#x1F50D;</button>
    </div>

    <div class="thought-drop">
      <input type="text" id="thoughtDrop" placeholder="I'm curious about..." />
    </div>

    <div class="card-stack" id="cardStack"></div>

    <div class="feed-hint">
      <span>swipe left = skip &middot; swipe right = more like this &middot; tap = dive in</span>
    </div>
  </div>

  <!-- Concept View -->
  <div id="conceptView" class="view">
    <div class="concept-header">
      <button class="back-btn" id="backBtn">&larr;</button>
      <span class="concept-title" id="conceptTitle"></span>
      <span class="concept-count" id="conceptCount"></span>
    </div>

    <div class="depth-stack" id="depthStack"></div>

    <div class="voice-bar">
      <span class="depth-nav-hint">scroll up/down &middot; swipe right = love it</span>
    </div>
  </div>

  <!-- Search Overlay -->
  <div class="search-overlay" id="searchOverlay">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search concepts..." autofocus />
      <button class="close-search" id="closeSearch">Cancel</button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<script>
// ── IndexedDB for engagement (fully offline) ──
const DB_NAME = 'microlearn';
const DB_VERSION = 1;
let idb = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('engagement')) {
        const store = db.createObjectStore('engagement', { keyPath: 'id', autoIncrement: true });
        store.createIndex('card_id', 'card_id');
        store.createIndex('event', 'event');
      }
      if (!db.objectStoreNames.contains('thoughts')) {
        db.createObjectStore('thoughts', { keyPath: 'id', autoIncrement: true });
      }
    };
    req.onsuccess = (e) => { idb = e.target.result; resolve(idb); };
    req.onerror = () => reject(req.error);
  });
}

function trackEngagement(cardId, event, durationMs = 0, metadata = {}) {
  if (!idb) return;
  const tx = idb.transaction('engagement', 'readwrite');
  tx.objectStore('engagement').add({
    card_id: cardId, event, duration_ms: durationMs,
    metadata, created_at: new Date().toISOString(),
  });
}

function saveThought(text) {
  if (!idb) return;
  const tx = idb.transaction('thoughts', 'readwrite');
  tx.objectStore('thoughts').add({ text, created_at: new Date().toISOString() });
}

// ── State ──
let allCards = [];
let feedCards = [];
let feedIndex = 0;
let currentConcept = null;
let depthCards = [];
let depthIndex = 0;

// ── Markdown rendering ──
function renderMarkdown(text) {
  if (!text) return '';
  return text
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre>$2</pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
}

// ── Feed algorithm (client-side) ──
function shuffleFeed(cards) {
  // Fisher-Yates shuffle
  const arr = [...cards];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── Load cards from cards.json ──
async function loadFeed() {
  try {
    const res = await fetch('cards.json');
    allCards = await res.json();
  } catch (e) {
    // Fallback: try cached version
    allCards = [];
  }
  feedCards = shuffleFeed(allCards);
  feedIndex = 0;
  renderFeedCard();
}

// ── Search (client-side) ──
function searchCards(query) {
  const q = query.toLowerCase();
  return allCards.filter(c =>
    c.title.toLowerCase().includes(q) ||
    c.topic.toLowerCase().includes(q) ||
    (c.idea || '').toLowerCase().includes(q) ||
    (c.example || '').toLowerCase().includes(q) ||
    (c.probe || '').toLowerCase().includes(q)
  );
}

// ── Feed View ──
function renderFeedCard() {
  const stack = document.getElementById('cardStack');

  if (feedIndex >= feedCards.length) {
    stack.innerHTML = `
      <div class="empty-state">
        <h2>You've seen them all</h2>
        <p>Drop a thought above or come back later for new cards</p>
      </div>`;
    return;
  }

  const card = feedCards[feedIndex];
  const hook = card.idea ? card.idea.substring(0, 120) + '...' : '';
  const depth = card.depth || 1;

  const el = document.createElement('div');
  el.className = 'teaser-card card-enter';
  el.innerHTML = `
    <span class="topic-tag">${card.topic || ''}</span>
    <h2 class="card-title">${card.title}</h2>
    <p class="card-hook">${renderMarkdown(hook)}</p>
    <div class="card-depth">
      <div class="depth-dots">
        ${Array.from({length: 3}, (_, i) => `<span class="dot ${i < depth ? 'filled' : ''}"></span>`).join('')}
      </div>
      <span>depth ${depth}</span>
    </div>
    <div class="swipe-indicator left">SKIP</div>
    <div class="swipe-indicator right">MORE</div>
  `;

  stack.innerHTML = '';
  stack.appendChild(el);

  trackEngagement(card.id, 'seen');
  setupSwipe(el, card);
  el.addEventListener('click', () => {
    if (Math.abs(el._swipeDx || 0) < 10) openConcept(card);
  });
}

function setupSwipe(el, card) {
  let startX = 0, startY = 0, dx = 0, dy = 0, swiping = false;
  const startTime = Date.now();

  const onStart = (x, y) => {
    startX = x; startY = y; dx = 0; dy = 0; swiping = true;
    el.style.transition = 'none';
  };

  const onMove = (x, y) => {
    if (!swiping) return;
    dx = x - startX; dy = y - startY;
    el._swipeDx = dx;
    el.style.transform = `translateX(${dx}px) rotate(${dx * 0.05}deg)`;
    el.querySelector('.swipe-indicator.left').style.opacity = dx < -30 ? Math.min(1, (-dx - 30) / 70) : 0;
    el.querySelector('.swipe-indicator.right').style.opacity = dx > 30 ? Math.min(1, (dx - 30) / 70) : 0;
  };

  const onEnd = () => {
    if (!swiping) return;
    swiping = false;
    if (Math.abs(dx) > 100) {
      const dir = dx > 0 ? 'right' : 'left';
      el.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
      el.style.transform = `translateX(${dx > 0 ? 400 : -400}px) rotate(${dx > 0 ? 15 : -15}deg)`;
      el.style.opacity = '0';
      trackEngagement(card.id, `swipe_${dir}`, Date.now() - startTime);
      setTimeout(() => { feedIndex++; renderFeedCard(); }, 250);
    } else {
      el.style.transition = 'transform 0.2s ease';
      el.style.transform = 'translateX(0) rotate(0deg)';
      el.querySelector('.swipe-indicator.left').style.opacity = 0;
      el.querySelector('.swipe-indicator.right').style.opacity = 0;
    }
  };

  el.addEventListener('touchstart', (e) => onStart(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
  el.addEventListener('touchmove', (e) => onMove(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
  el.addEventListener('touchend', () => onEnd());
  el.addEventListener('mousedown', (e) => {
    onStart(e.clientX, e.clientY);
    const mv = (e) => onMove(e.clientX, e.clientY);
    const up = () => { onEnd(); window.removeEventListener('mousemove', mv); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', mv);
    window.addEventListener('mouseup', up);
  });
}

// ── Concept View ──
function openConcept(card) {
  currentConcept = card.concept;
  trackEngagement(card.id, 'tap');

  depthCards = allCards.filter(c => c.concept === card.concept).sort((a, b) => a.depth - b.depth);
  if (depthCards.length === 0) depthCards = [card];
  depthIndex = 0;

  document.getElementById('feedView').classList.remove('active');
  document.getElementById('conceptView').classList.add('active');
  document.getElementById('conceptTitle').textContent = card.topic || card.concept;
  updateDepthCount();
  renderDepthCard();
}

function closeConcept() {
  document.getElementById('conceptView').classList.remove('active');
  document.getElementById('feedView').classList.add('active');
  currentConcept = null;
}

function updateDepthCount() {
  document.getElementById('conceptCount').textContent = `${depthIndex + 1} / ${depthCards.length}`;
}

function renderDepthCard() {
  const stack = document.getElementById('depthStack');

  if (depthIndex >= depthCards.length) {
    stack.innerHTML = `<div class="empty-state"><h2>End of thread</h2><p>Go back to discover more</p></div>`;
    return;
  }

  const card = depthCards[depthIndex];
  const phases = [];
  if (card.idea) phases.push({ label: 'Idea', content: card.idea, phase: 'idea' });
  if (card.example) phases.push({ label: 'Example', content: card.example, phase: 'example' });
  if (card.probe) phases.push({ label: 'Probe', content: card.probe, phase: 'probe' });

  const el = document.createElement('div');
  el.className = 'depth-card phase-idea card-enter';
  el.innerHTML = `
    <span class="phase-label">${card.title}</span>
    <div class="card-body">
      ${phases.map(p => {
        const colors = { idea: 'var(--accent)', example: 'var(--purple)', probe: 'var(--emerald)' };
        const bgColors = { idea: 'rgba(122, 162, 255, 0.06)', example: 'rgba(196, 181, 253, 0.06)', probe: 'rgba(110, 231, 183, 0.06)' };
        return `
        <div style="margin-bottom: 32px;">
          <div style="display: inline-flex; align-items: center; gap: 8px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: ${colors[p.phase]}; margin-bottom: 14px; padding: 5px 12px; border-radius: 8px; background: ${bgColors[p.phase]};">
            <span style="width: 5px; height: 5px; border-radius: 50%; background: ${colors[p.phase]};"></span>
            ${p.label}
          </div>
          <div>${renderMarkdown(p.content)}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="swipe-indicator left">SKIP</div>
    <div class="swipe-indicator right">&#x2764;</div>
  `;

  stack.innerHTML = '';
  stack.appendChild(el);
  updateDepthCount();
  trackEngagement(card.id, 'seen');
  setupDepthSwipe(el, card);
}

function setupDepthSwipe(el, card) {
  let startX = 0, startY = 0, dx = 0, dy = 0, swiping = false;
  const startTime = Date.now();

  const onStart = (x, y) => { startX = x; startY = y; dx = 0; dy = 0; swiping = true; el.style.transition = 'none'; };
  const onMove = (x, y) => {
    if (!swiping) return;
    dx = x - startX; dy = y - startY;
    if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 15) { swiping = false; el.style.transform = ''; return; }
    if (Math.abs(dx) > 15) {
      el.style.transform = `translateX(${dx}px) rotate(${dx * 0.03}deg)`;
      el.querySelector('.swipe-indicator.left').style.opacity = dx < -30 ? Math.min(1, (-dx - 30) / 70) : 0;
      el.querySelector('.swipe-indicator.right').style.opacity = dx > 30 ? Math.min(1, (dx - 30) / 70) : 0;
    }
  };
  const onEnd = () => {
    if (!swiping) return;
    swiping = false;
    if (Math.abs(dx) > 100) {
      el.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
      el.style.transform = `translateX(${dx > 0 ? 400 : -400}px) rotate(${dx > 0 ? 15 : -15}deg)`;
      el.style.opacity = '0';
      trackEngagement(card.id, dx > 0 ? 'swipe_right' : 'swipe_left', Date.now() - startTime);
      setTimeout(() => { depthIndex++; renderDepthCard(); }, 250);
    } else {
      el.style.transition = 'transform 0.2s ease'; el.style.transform = '';
      el.querySelector('.swipe-indicator.left').style.opacity = 0;
      el.querySelector('.swipe-indicator.right').style.opacity = 0;
    }
  };

  el.addEventListener('touchstart', (e) => onStart(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
  el.addEventListener('touchmove', (e) => onMove(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
  el.addEventListener('touchend', () => onEnd());
  el.addEventListener('mousedown', (e) => {
    onStart(e.clientX, e.clientY);
    const mv = (e) => onMove(e.clientX, e.clientY);
    const up = () => { onEnd(); window.removeEventListener('mousemove', mv); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', mv); window.addEventListener('mouseup', up);
  });
}

// ── Scroll nav in depth view ──
(function() {
  let t = null;
  document.getElementById('depthStack').addEventListener('wheel', (e) => {
    if (Math.abs(e.deltaY) > 30) {
      if (t) return; t = setTimeout(() => { t = null; }, 300);
      if (e.deltaY > 0 && depthIndex < depthCards.length - 1) { depthIndex++; renderDepthCard(); }
      else if (e.deltaY < 0 && depthIndex > 0) { depthIndex--; renderDepthCard(); }
    }
  });
})();

// ── Search ──
document.getElementById('searchBtn').addEventListener('click', () => {
  document.getElementById('searchOverlay').classList.add('active');
  document.getElementById('searchInput').focus();
});

document.getElementById('closeSearch').addEventListener('click', () => {
  document.getElementById('searchOverlay').classList.remove('active');
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').innerHTML = '';
});

let searchDebounce = null;
document.getElementById('searchInput').addEventListener('input', (e) => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    const q = e.target.value.trim();
    if (q.length < 2) { document.getElementById('searchResults').innerHTML = ''; return; }
    const results = searchCards(q);
    const container = document.getElementById('searchResults');
    container.innerHTML = results.map(r => `
      <div class="search-result-item" data-id="${r.id}">
        <div class="result-topic">${r.topic || ''}</div>
        <div class="result-title">${r.title}</div>
        <div class="result-snippet">${(r.idea || '').substring(0, 100)}...</div>
      </div>
    `).join('');
    container.querySelectorAll('.search-result-item').forEach(item => {
      item.addEventListener('click', () => {
        const card = allCards.find(c => c.id === item.dataset.id);
        if (card) { document.getElementById('searchOverlay').classList.remove('active'); openConcept(card); }
      });
    });
  }, 150);
});

// ── Thought drop ──
document.getElementById('thoughtDrop').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const thought = e.target.value.trim();
    if (thought) {
      saveThought(thought);
      e.target.value = '';
      e.target.blur();
      e.target.placeholder = 'Noted! Cards coming soon...';
      setTimeout(() => { e.target.placeholder = "I'm curious about..."; }, 2000);
    }
  }
});

// ── Back button ──
document.getElementById('backBtn').addEventListener('click', closeConcept);

// ── Keyboard nav ──
document.addEventListener('keydown', (e) => {
  if (document.getElementById('searchOverlay').classList.contains('active')) return;
  if (document.activeElement.tagName === 'INPUT') return;
  const inConcept = document.getElementById('conceptView').classList.contains('active');
  if (e.key === 'Escape' && inConcept) closeConcept();
  else if (e.key === 'ArrowUp' && inConcept && depthIndex > 0) { depthIndex--; renderDepthCard(); }
  else if ((e.key === 'ArrowDown' || e.key === ' ') && inConcept && depthIndex < depthCards.length - 1) { depthIndex++; renderDepthCard(); }
  else if (e.key === 'ArrowLeft') { feedIndex++; renderFeedCard(); }
  else if (e.key === 'ArrowRight' && !inConcept && feedCards[feedIndex]) openConcept(feedCards[feedIndex]);
  else if (e.key === 'Enter' && !inConcept && feedCards[feedIndex]) openConcept(feedCards[feedIndex]);
});

// ── Init ──
openDB().then(() => loadFeed());

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
